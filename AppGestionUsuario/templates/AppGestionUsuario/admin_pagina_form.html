{% extends 'home.html' %}

{% block content %}
<!-- Quill Rich Text Editor CSS -->
<link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">

<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-10">
            <div class="card shadow-lg border-0" style="border-radius: 20px;">
                <div class="card-header bg-dark text-white p-4" style="border-radius: 20px 20px 0 0;">
                    <div class="d-flex justify-content-between align-items-center">
                        <h2 class="card-title mb-0 fw-bold"><i class="fas fa-file-signature me-2"></i>Editar Página: {{ object.titulo }}</h2>
                        <a href="{% url 'admin_content_dashboard' %}" class="btn btn-outline-light btn-sm rounded-pill px-3">
                            <i class="fas fa-arrow-left me-1"></i> Volver
                        </a>
                    </div>
                    <p class="mb-0 mt-2 opacity-75 small">Modifica el contenido visual de la página con el editor enriquecido.</p>
                </div>
                <div class="card-body p-4">
                    <form method="post" id="pagina-form" class="needs-validation" novalidate>
                        {% csrf_token %}
                        
                        <div class="row g-3">
                            <div class="col-md-8">
                                <label for="{{ form.titulo.id_for_label }}" class="form-label fw-bold text-dark small">Título</label>
                                {{ form.titulo }}
                            </div>
                            <div class="col-md-4">
                                <label for="{{ form.slug.id_for_label }}" class="form-label fw-bold text-dark small">Slug (ID Único)</label>
                                {{ form.slug }}
                            </div>
                            
                            <!-- Editor Quill -->
                            <div class="col-12 mt-4">
                                <label class="form-label fw-bold text-dark small">Contenido de la Página</label>
                                <div id="editor-container" style="height: 400px; background-color: white; border-radius: 0 0 12px 12px;">
                                    {{ object.contenido_html|safe }}
                                </div>
                                <!-- Campo oculto para enviar el contenido HTML -->
                                <textarea name="contenido_html" style="display:none" id="hidden_contenido_html"></textarea>
                            </div>
                        </div>

                        <hr class="my-4 opacity-10">

                        <div class="d-grid">
                            <button type="submit" class="btn btn-dark btn-lg shadow-sm" style="border-radius: 12px;">
                                <i class="fas fa-check-circle me-2"></i> Actualizar Página
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Quill JS -->
<script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        var quill = new Quill('#editor-container', {
            theme: 'snow',
            modules: {
                toolbar: [
                    [{ 'header': [1, 2, 3, false] }],
                    ['bold', 'italic', 'underline', 'strike'],
                    [{ 'list': 'ordered'}, { 'list': 'bullet' }],
                    [{ 'color': [] }, { 'background': [] }],
                    [{ 'align': [] }],
                    ['link', 'image', 'video'],
                    ['clean']
                ]
            }
        });

        var form = document.getElementById('pagina-form');
        form.onsubmit = function() {
            // Copiar el contenido de Quill al textarea oculto antes de enviar
            var contenidoHtml = document.querySelector('.ql-editor').innerHTML;
            document.getElementById('hidden_contenido_html').value = contenidoHtml;
        };
    });
</script>

<style>
    .ql-toolbar.ql-snow { border-radius: 12px 12px 0 0; border: 1px solid #dee2e6; }
    .ql-container.ql-snow { border: 1px solid #dee2e6; border-radius: 0 0 12px 12px; font-size: 1rem; }
    .form-control:focus { border-color: #212529; box-shadow: 0 0 0 0.25rem rgba(33, 37, 41, 0.25); }
</style>
{% endblock %}
