<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resultados - {{ examen.nombre }}</title>
    <style>
        :root {
            --primary-color: #4a90e2;
            --secondary-color: #50e3c2;
            --accent-color: #f5a623;
            --bg-color: #f0f4f8;
            --card-bg: #ffffff;
            --text-color: #333;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 40px 20px;
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .result-card {
            background: var(--card-bg);
            max-width: 600px;
            width: 100%;
            padding: 3rem;
            border-radius: 30px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.1);
            text-align: center;
            border-top: 10px solid var(--primary-color);
        }

        .score-circle {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            background: #f8f9fa;
            border: 8px solid var(--secondary-color);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            margin: 2rem auto;
            box-shadow: 0 10px 20px rgba(80, 227, 194, 0.2);
        }

        .score-value {
            font-size: 3rem;
            font-weight: bold;
            color: var(--primary-color);
            line-height: 1;
        }

        .score-label {
            font-size: 0.9rem;
            color: #777;
            text-transform: uppercase;
            font-weight: bold;
        }

        h1 { color: var(--primary-color); margin-bottom: 0.5rem; }
        p { color: #666; font-size: 1.1rem; }

        .btn-home {
            display: inline-block;
            margin-top: 2rem;
            padding: 1rem 2rem;
            background: var(--primary-color);
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            transition: all 0.3s;
            box-shadow: 0 5px 15px rgba(74, 144, 226, 0.3);
        }

        .btn-home:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(74, 144, 226, 0.4);
            background: #357abd;
        }

        .meta-info {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 2rem;
            padding-top: 2rem;
            border-top: 1px solid #eee;
        }

        .meta-item strong { display: block; color: var(--primary-color); font-size: 1.2rem; }
        .meta-item span { color: #999; font-size: 0.8rem; text-transform: uppercase; }
    </style>
</head>
<body>
    <div class="result-card">
        <h1>¡Evaluación Finalizada!</h1>
        <p>Has completado el examen: <strong>{{ examen.nombre }}</strong></p>

        <div class="score-circle">
            <div class="score-value">{{ resultado.puntaje|floatformat:0 }}%</div>
            <div class="score-label">Dominio</div>
        </div>

        <div class="meta-info">
            <div class="meta-item">
                <span>Tema Evaluado</span>
                <strong>{{ examen.tema.nombre }}</strong>
            </div>
            <div class="meta-item">
                <span>Fecha</span>
                <strong>{{ resultado.fecha_realizacion|date:"d/m/Y" }}</strong>
            </div>
        </div>

        <a href="{% url 'tutoria:tema_detalle' examen.tema.slug %}" class="btn-home">Volver al Tema</a>
    </div>
</body>
</html>
