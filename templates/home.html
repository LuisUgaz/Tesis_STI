<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Inicio - Tesis STI</title>
</head>
<body>
    <h1>Bienvenido al Sistema Tutor Inteligente</h1>
    {% if user.is_authenticated %}
        <p>Hola, <strong>{{ user.username }}</strong>! Has iniciado sesión correctamente.</p>
        
        <div style="margin-bottom: 1rem;">
            <a href="{% url 'profile' username=user.username %}" style="
                text-decoration: none;
                color: white;
                background-color: #4a90e2;
                padding: 0.5rem 1rem;
                border-radius: 5px;
                font-weight: bold;
                margin-right: 0.5rem;
            ">Ver mi Perfil</a>

            <form id="logout-form" action="{% url 'logout' %}" method="post" style="display: inline;">
            {% csrf_token %}
            <button type="submit" onclick="return confirmarCierreSesion();" style="
                padding: 0.5rem 1rem;
                background-color: #d0021b;
                color: white;
                border: none;
                border-radius: 5px;
                cursor: pointer;
                font-weight: bold;
            ">Cerrar Sesión</button>
        </form>

        <script>
            function confirmarCierreSesion() {
                return confirm("¿Estás seguro de que deseas cerrar tu sesión?");
            }
        </script>
    {% else %}
        <p>No has iniciado sesión. <a href="{% url 'login' %}">Inicia sesión aquí</a></p>
    {% endif %}
</body>
</html>
